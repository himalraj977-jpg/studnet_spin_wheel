<!DOCTYPE html>
<html lang="en">

<head>
<meta charset="UTF-8">
<title>Student Spin Wheel</title>
<link rel="stylesheet" href="styles.css">
</head>

<body>

<h1>🎯 Student Spin Wheel</h1>

<div class="wheel-container">

<canvas id="wheel" width="500" height="500"></canvas>

<button id="spinBtn">SPIN</button>

</div>

<div class="controls">

<input type="text" id="nameInput" placeholder="Enter student name">

<button onclick="addName()">Add Name</button>
<button onclick="removeName()">Remove Name</button>
<button onclick="resetWheel()">Reset Wheel</button>

<button onclick="shuffleNames()">Shuffle Names</button>
<button onclick="showTotal()">Show Total</button>
<button onclick="addRandom()">Add Random</button>
<button onclick="clearInput()">Clear Input</button>
<button onclick="saveNames()">Save Names</button>
<button onclick="loadNames()">Load Names</button>

</div>

<h2 id="result"></h2>

<script src="app.js"></script>

</body>
</html>

<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Spin Wheel App</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

<h1>🎯 Student Spin Wheel</h1>

<div class="container">
    <canvas id="wheel" width="600" height="600"></canvas>
</div>

<br>

<input type="text" id="nameInput" placeholder="Enter name">
<button onclick="addName()">Add</button>
<button onclick="spin()">Spin</button>
<button onclick="reset()">Reset</button>

<br><br>

<!-- NEW FUNCTIONS -->
<button onclick="exportRoster()">Export Roster</button>
<input type="file" onchange="importRoster(event)">
<button onclick="removeWinner()">Remove Winner</button>
<button onclick="undoRemove()">Undo Remove</button>
<button onclick="copyHistory()">Copy History</button>
<button onclick="resetHistory()">Reset History</button>
<button onclick="cleanRoster()">Clean Roster</button>

<h2>Winner: <span id="winner"></span></h2>

<h3>History</h3>
<ul id="history"></ul>

<script src="app.js"></script>

</body>
</html>

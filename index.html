<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Student Spin Wheel</title>
<link rel="stylesheet" href="style.css">
</head>

<body>

<div class="container">

<h1>🎡 Student Spin Wheel</h1>
<p>Enter student names and spin the wheel to randomly select a student</p>

<textarea id="names" placeholder="Enter student names separated by comma"></textarea>

<br>

<button id="update">Update Wheel</button>

<div class="wheel-container">
<canvas id="wheel" width="600" height="600"></canvas>
</div>

<button id="spin">SPIN</button>

<h2 id="result"></h2>

</div>

<script src="script.js"></script>

</body>
</html>

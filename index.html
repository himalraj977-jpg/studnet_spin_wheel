<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Student Spin Wheel</title>
<link rel="stylesheet" href="style.css">
</head>

<body>

<h1>Student Spin Wheel</h1>

<div class="container">

<!-- Roster -->
<div class="roster">

<h2>Roster</h2>

<textarea id="names" placeholder="One name per line"></textarea>

<div class="buttons">

<button onclick="updateWheel()">Update Wheel</button>
<button onclick="shuffleNames()">Shuffle</button>
<button onclick="clearNames()">Clear</button>

<button onclick="importRoster()">Import Roster</button>
<button onclick="exportRoster()">Export Roster</button>
<button onclick="cleanRoster()">Clean Roster</button>

</div>

</div>


<!-- Spin Wheel -->
<div class="wheel-section">

<div class="pointer">▼</div>

<canvas id="wheel" width="600" height="600"></canvas>

<br>

<button class="spinBtn" onclick="spin()">SPIN</button>

<button onclick="removeWinner()">Remove Winner</button>
<button onclick="undoRemove()">Undo Remove</button>

<button onclick="resetHistory()">Reset History</button>
<button onclick="copyHistory()">Copy History</button>
<button onclick="exportHistory()">Export History</button>

<h2 id="winner"></h2>

</div>

</div>

<input type="file" id="fileInput" style="display:none">

<script src="app.js"></script>

</body>
</html>
